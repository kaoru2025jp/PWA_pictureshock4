<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS</title>

<style>
body{
font-family:Calibri,Arial;
background:#f5f6f7;
padding:30px;
max-width:900px;
margin:auto;
line-height:1.7;
}

/* スマホ対応 */
@media (max-width:600px){
body{padding:10px;font-size:18px;}
#slider{width:100%;height:auto;}
button{width:100%;font-size:18px;}
.excelTable{width:100%;font-size:16px;}
input{width:100%;margin-bottom:10px;font-size:18px;}
}

/* 画像 */
#slider{
width:420px;
height:220px;
margin-bottom:25px;
border:2px solid #c0c0c0;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
#slider img{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* 入力フォーム */
.inputBox{
background:white;
padding:20px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}
input{
padding:8px;
margin-right:10px;
}

/* Excel風 */
.excelTable{
border-collapse:collapse;
background:white;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}
.excelTable th{
background:#217346;
color:white;
padding:10px;
border:1px solid #c6c6c6;
}
.excelTable td{
border:1px solid #d9d9d9;
padding:10px;
text-align:center;
}
.rowIndex{
background:#f3f3f3;
font-weight:bold;
}

/* ボタン */
button{
background:#217346;
color:white;
border:none;
padding:10px 18px;
cursor:pointer;
border-radius:4px;
margin-top:10px;
}

/* 結果表示 */
#result{
margin-top:15px;
font-weight:bold;
color:#333;
}
</style>
</head>

<body>

<h1>Whale – Plankton Economic Model</h1>

<!-- 画像 -->
<div id="slider">
<img id="slideImg" src="photo1.png">
</div>

<!-- 入力フォーム -->
<div class="inputBox">
<h2>INPUT</h2>

<label>B</label><br>
<input type="number" id="B"><br>

<label>O1</label><br>
<input type="number" id="O1"><br>

<label>O2</label><br>
<input type="number" id="O2"><br>

<label>T</label><br>
<input type="number" id="T"><br>

<button onclick="myFunc()">CALCULATE</button>

<div id="result"></div>
</div>

<div id="table"></div>

<script>

/* 画像スライド */
var images=["photo1.png","photo2.png","photo3.png"];
var index=0;

function rotateImage(){
index++;
if(index>=images.length){index=0;}
document.getElementById("slideImg").src=images[index];
}
setInterval(rotateImage,3000);

/* 計算（入力方式） */
function myFunc(){

var B=Number(document.getElementById("B").value);
var O1=Number(document.getElementById("O1").value);
var O2=Number(document.getElementById("O2").value);
var T=Number(document.getElementById("T").value);

var S1=B-O1*T;
var S2=B-O2*T;
var S=B-O1-O2;

/* 結果表示 */
document.getElementById("result").innerHTML=
"S1 = "+S1+"<br>S2 = "+S2;

/* テーブル */
showTable(B,O1,O2,S);
}

/* テーブル表示 */
function showTable(B,O1,O2,S){
var table="<table class='excelTable'>";
table+="<tr><th></th><th>項目</th><th>値</th></tr>";
table+="<tr><td class='rowIndex'>1</td><td>B</td><td>"+B+"</td></tr>";
table+="<tr><td class='rowIndex'>2</td><td>O1</td><td>"+O1+"</td></tr>";
table+="<tr><td class='rowIndex'>3</td><td>O2</td><td>"+O2+"</td></tr>";
table+="<tr><td class='rowIndex'>4</td><td>S=B-O1-O2</td><td>"+S+"</td></tr>";
table+="</table>";
document.getElementById("table").innerHTML=table;
}

</script>

</body>
</html>
